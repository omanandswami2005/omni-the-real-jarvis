; PlatformIO project configuration for ESP32-CAM + INMP441 Smart Glasses
;
; Build & Flash:
;   pio run -t upload -t monitor
;
; Or via Arduino IDE:
;   Board: "AI Thinker ESP32-CAM"
;   Partition: "Huge APP (3MB No OTA/1MB SPIFFS)"

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; For ESP32-S3 boards with camera + more GPIOs:
; [env:esp32s3cam]
; platform = espressif32
; board = esp32-s3-devkitc-1
; framework = arduino
; monitor_speed = 115200
; board_build.arduino.memory_type = qio_opi
; build_flags =
;     -DBOARD_HAS_PSRAM
;     -DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
    -DBOARD_HAS_PSRAM
